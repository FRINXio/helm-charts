# Global settings

x-device-discovery-enabled: &device-discovery-enabled true

# Default values for FRINX-machine.

krakend:
  enabled: true
  fullnameOverride: "krakend"
  image:
    repository: "frinx/krakend"
    tag: "6.0.0-rc-1"

frinx-frontend:
  enabled: true
  fullnameOverride: "frinx-frontend"

  image:
    repository: "frinx/frinx-frontend"
    tag: "latest"
    pullPolicy: Always

  proxyImage:
    name: frinx/frinx-graphql-proxy
    tag: "latest"
    pullPolicy: Always

  env:
    AUTH_CLIENT_ID: "frinx"
    DEVICE_TOPOLOGY_ENABLED: true
    INVENTORY_API_URL: "/api/proxy"
    RESOURCE_MANAGER_API_URL: "/api/proxy"
    AUTH_ENABLED: true

  proxyEnv:
    CONDUCTOR_URL: http://conductor-server:8080
    SCHELLAR_URL: http://conductor-server:3000/query
    INVENTORY_URL: http://inventory:8000/graphql
    RESOURCE_MANAGER_URL: http://resource-manager:8884/query
    DEBUG: 1

postgresql:
  enabled: false
  fullnameOverride: "frinx-postgresql"
  auth:
    enablePostgresUser: true
    username: postgresU
    password: postgresP
    database: postgres
  architecture: standalone
  primary:
    initdb:
      scripts:
        init_db.sql: |
          CREATE DATABASE schellar;
          CREATE DATABASE conductor;
          CREATE DATABASE inventory;

resource-manager:
  enabled: true
  fullnameOverride: "resource-manager"
  image:
    repository: "frinx/resource-manager"
    tag: "latest"
    pullPolicy: Always
  postgresql:
    enabled: false
  env:
    PSQL_HOSTNAME: postgresql-rw
    RM_DB_CONNECTION_STRING: "postgres://resource_user:resource@postgresql-rw:5432/frinx?sslmode=disable"


workflow-manager:
  enabled: true
  fullnameOverride: "conductor-server"
  image:
    repository: "frinx/conductor-server"
    tag: "latest"
  schellarImage:
    repository: "frinx/schellar"
    tag: "4.0.0"
  postgresql:
    enabled: false
  conductorEnv:
    DATABASE: frinx
    POSTGRES_DB_SCHEMA: conductor
    SPRING_DATASOURCE_HOSTNAME: postgresql-rw
    CONDUCTOR_EXTERNALPAYLOADSTORAGE_POSTGRES_HOSTNAME: postgresql-rw
    SPRING_SEARCHDATASOURCE_HOSTNAME: postgresql-rw
  conductorExtraEnv:
    CONDUCTOR_APP_MAXTASKINPUTPAYLOADSIZETHRESHOLD: 102400
    CONDUCTOR_APP_MAXTASKOUTPUTPAYLOADSIZETHRESHOLD: 102400
    SPRING_DATASOURCE_USERNAME: conductor_user
    SPRING_DATASOURCE_PASSWORD: conductor
    SPRING_SEARCHDATASOURCE_USERNAME: conductor_user
    SPRING_SEARCHDATASOURCE_PASSWORD: conductor
    SPRING_SEARCHDATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 8
    CONDUCTOR_EXTERNALPAYLOADSTORAGE_POSTGRES_USERNAME: conductor_user
    CONDUCTOR_EXTERNALPAYLOADSTORAGE_POSTGRES_PASSWORD: conductor
    CONDUCTOR_DATASOURCE_SCHEMA: conductor
  schellarEnv:
    POSTGRES_DATABASE_URL: "host=postgresql-rw port=5432 user=schellar_user password=schellar database=frinx"


inventory:
  enabled: true
  fullnameOverride: "inventory"
  image:
    repository: "frinx/frinx-inventory-server"
    pullPolicy: Always
    tag: "latest"
  postgresql:
    enabled: false
  env:
    POSTGRES_HOSTNAME: postgresql-rw
    TOPOLOGY_ENABLED: *device-discovery-enabled
    POSTGRES_PASSWORD: inventory
    POSTGRES_USER: inventory
    POSTGRES_DB: frinx
    POSTGRES_DB_SCHEMA: inventory
  extraEnv:


topology-discovery:
  enabled: *device-discovery-enabled
  fullnameOverride: "topology-discovery"
  image:
    repository: "frinx/topology-discovery"
    tag: "1.3.4"

frinx-arango-config:
  enabled: true
  arangodb_config:
    enabled: *device-discovery-enabled
    image:
      repository: arangodb/arangodb
      tag: 3.9.9-noavx
    # securityContext:
    #   readOnlyRootFilesystem: true
    #   runAsUser: 1000
    #   runAsGroup: 2000
    #   fsGroup: 3000
    # affinity:
    #   nodeAffinity:
    #     requiredDuringSchedulingIgnoredDuringExecution:
    #       nodeSelectorTerms:
    #       - matchExpressions:
    #         - key: app
    #           operator: In
    #           values:
    #           - arangobd

kube-arangodb:
  operator:
    replicaCount: 1
    args:
      - --deployment.feature.ephemeral-volumes=true
  rbac:
    enabled: true
    extensions:
      monitoring: false
      acs: false
      at: false

uniconfig-postgresql:
  enabled: false
  fullnameOverride: "uniconfig-postgresql"
  auth:
    enablePostgresUser: true
    username: postgresU
    password: postgresP
    database: uniconfig
  architecture: standalone

uniconfig:
  enabled: true
  image:
    repository: "frinx/uniconfig"
    tag: "5.2.6"
  imagePullSecrets:
    - name: regcred
  postgresql:
    enabled: false
  dbPersistence:
    DBPERSISTENCE_CONNECTION_DATABASELOCATIONS_0_HOST: "uniconfig-postgresql-rw"
    DBPERSISTENCE_CONNECTION_USERNAME: "postgresU"
    DBPERSISTENCE_CONNECTION_PASSWORD: "postgresP"
  traefik:
    ingress:
      enabled: true
      host: uniconfig.10.19.0.39.nip.io
    rbac:
      namespaced: true
  securityContext:
    capabilities:
      add:
      - NET_BIND_SERVICE
      drop:
      - ALL


