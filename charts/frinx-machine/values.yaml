# Component configuration

oauth2-proxy:
  enabled: true
  fullnameOverride: "oauth2-proxy"

  image:
    repository: "frinx/oauth2-proxy"
    tag: "6.0.0-alpine"
    pullPolicy: "Always"
    imagePullSecrets:
      - name: *frinx-image-pull-secret

  config:
    cookieSecret: 
    clientSecret: 
    clientID: 
    configFile: |-
      github_org = "FRINXio"  # Replace with your GitHub org name, or github_team=team_name to limit access to a specific team
      scope = "user:email read:org groups"
      email_domains = [ "*" ]  # Replace with [ "example.com" ] to limit access to users with specific email domain
      provider = "github"
      cookie_secure = true
      cookie_domains = [ "chart-example.local" ]  # Replace with domain names that the proxy is allowed to redirect to after auth
      whitelist_domains = [ "chart-example.local" ]  # Same as above

  extraArgs:
    - --provider=github
    - --upstream=http://krakend:8080
    - --upstream=ws://krakend:8001
    - --redirect-url=http://chart-example.local/oauth2/callback
    - --cookie-secure=false
    - --pass-authorization-header
    - --login-url=https://github.com/login/oauth/authorize
    - --custom-sign-in-logo=/tmp/frinx/frinx.png
    - --custom-templates-dir=/tmp/frinx
    - --proxy-websockets=true

krakend:
  enabled: true
  fullnameOverride: "krakend"
  replicaCount: 1

  image:
    repository: "frinx/krakend"
    tag: "6.0.0"

  proxyImage:
    repository: "nginx"
    tag: "1.25.4-alpine"

  rbac:
    UNICONFIG_CONTROLLER_ADMIN_GROUP: "FRINXio"
    UNISTORE_CONTROLLER_ADMIN_GROUP: "FRINXio"
    UNISTORE_BEARER_ROLE: ""
    UNISTORE_SERVICE_ROLE: ""
    UNISTORE_NETWORK_ROLE: ""
    UNISTORE_OTHER_PERMITTED_ROLES: ""
    UNISTORE_BEARER_NODE: "bearer"
    UNISTORE_SERVICE_NODE: "service"
    UNISTORE_NETWORK_NODE: "network"
    INVENTORY_ADMIN_GROUP: "FRINXio"
    ADMIN_ACCESS_ROLE: "FRINXio"
    X_AUTH_USER_GROUP: "FRINXio"

  env:
    L3VPN_ENABLED: true
    DEVICE_TOPOLOGY_ENABLED: true
    LOG_LEVEL: DEBUG

frinx-frontend:
  enabled: true
  fullnameOverride: "frinx-frontend"

  image:
    repository: "frinx/frinx-frontend"
    tag: "latest"
    pullPolicy: "Always"

  proxyImage:
    name: frinx/frinx-graphql-proxy
    tag: "6.0.0"
    pullPolicy: "Always"

  env:
    AUTH_CLIENT_ID: "frinx"
    DEVICE_TOPOLOGY_ENABLED: true
    INVENTORY_API_URL: "/api/proxy"
    RESOURCE_MANAGER_API_URL: "/api/proxy"
    AUTH_ENABLED: true
    UNISTORE_API_URL: "/api/uniconfig"
    INVENTORY_WS_PATH: /api/proxy
    INVENTORY_WS_SCHEMA: "ws://"

  proxyEnv:
    DEBUG: 1

resource-manager:
  enabled: true
  fullnameOverride: "resource-manager"

  image:
    repository: "frinx/resource-manager"
    tag: "6.0.0"
    pullPolicy: "Always"

  postgresql:
    enabled: false

  dbPersistence:
    POSTGRES_HOST: postgresql-rw
    POSTGRES_DATABASE: frinx
    existingSecret:
      secretName: *frinx-database-password
      postgresUsernameKey: RM_POSTGRES_USERNAME
      postgresPasswordKey: RM_POSTGRES_PASSWORD

  rbac:
    RM_ADMIN_ROLES: FRINXio
    RM_ADMIN_GROUPS: FRINXio

workflow-manager:
  enabled: true
  fullnameOverride: "conductor-server"

  image:
    repository: "frinx/conductor-server"
    tag: "6.0.0"
    pullPolicy: "Always"

  schellarImage:
    repository: "frinx/schellar"
    tag: "6.0.0"
    pullPolicy: "Always"

  postgresql:
    enabled: false

  conductorExtraEnv:
    SPRING_SEARCHDATASOURCE_HIKARI_MAXIMUMPOOLSIZE: 8

  dbPersistence:
    SPRING_DATASOURCE_HOST: postgresql-rw
    SPRING_SEARCHDATASOURCE_HOST: postgresql-rw
    CONDUCTOR_EXTERNALPAYLOADSTORAGE_POSTGRES_HOST: postgresql-rw
    POSTGRES_DATABASE: frinx
    CONDUCTOR_DATASOURCE_SCHEMA: conductor
    POSTGRES_DB_SCHEMA: conductor
    existingSecret:
      secretName: *frinx-database-password
      conductorExternalpayloadstoragePostgresUsernameKey: CONDUCTOR_EXTERNALPAYLOADSTORAGE_POSTGRES_USERNAME
      conductorExternalpayloadstoragePostgresPasswordKey: CONDUCTOR_EXTERNALPAYLOADSTORAGE_POSTGRES_PASSWORD
      springDatasourceUsernameKey: SPRING_DATASOURCE_USERNAME
      springDatasourcePasswordKey: SPRING_DATASOURCE_PASSWORD
      springSearchdatasourceUsernameKey: SPRING_SEARCHDATASOURCE_USERNAME
      springSearchdatasourcePasswordKey: SPRING_SEARCHDATASOURCE_PASSWORD

  schellarDbPersistence:
    POSTGRES_HOST: postgresql-rw
    POSTGRES_DATABASE: frinx
    existingSecret:
      secretName: *frinx-database-password
      postgresUsernameKey: SCHELLAR_POSTGRES_USERNAME
      postgresPasswordKey: SCHELLAR_POSTGRES_PASSWORD

inventory:
  enabled: true
  fullnameOverride: "inventory"

  image:
    repository: "frinx/frinx-inventory-server"
    tag: "6.0.1"
    pullPolicy: "Always"

  postgresql:
    enabled: false

  dbPersistence:
    POSTGRES_HOST: "postgresql-rw"
    POSTGRES_DATABASE: frinx
    POSTGRES_DB_SCHEMA: inventory
    existingSecret:
      secretName: *frinx-database-password
      postgresUsernameKey: INVENTORY_POSTGRES_USERNAME
      postgresPasswordKey: INVENTORY_POSTGRES_PASSWORD
  env:
    TOPOLOGY_ENABLED: true

  extraEnv:
    NODE_ENV: 'development'

  
topology-discovery:
  enabled: true
  fullnameOverride: "topology-discovery"

  image:
    repository: "frinx/topology-discovery"
    tag: "6.0.0"
    pullPolicy: "Always"

  imagePullSecrets:
    - name: *frinx-image-pull-secret

  dbPersistence:
    ARANGO_URL: 'http://arangodb:8529'
    existingSecret:
      secretName: *frinx-database-password
      arangoUsernameKey: TD_ARANGO_USERNAME
      arangoRootPasswordKey: TD_ARANGO_ROOT_PASSWORD

uniconfig:
  enabled: true 
  fullnameOverride: "uniconfig-controller"

  image:
    repository: "frinx/uniconfig"
    tag: "6.0.0"

  imagePullSecrets:
    - name: *frinx-image-pull-secret

  postgresql:
    enabled: false
    
  dbPersistence:
    POSTGRES_HOST: "uniconfig-postgresql-rw"
    existingSecret:
      secretName: *frinx-database-password
      postgresUsernameKey: UNICONFIG_POSTGRES_USERNAME
      postgresPasswordKey: UNICONFIG_POSTGRES_PASSWORD
      clishellSshserverUsernamepasswordauthPasswordKey: UNICONFIG_CLISHELL_SSHSERVER_USERNAMEPASSWORDAUTH_PASSWORD

  traefik:
    enabled: true
    rbac:
      namespaced: true

  securityContext:
    capabilities:
      add:
      - NET_BIND_SERVICE
      drop:
      - ALL

  traefikExtraService:
    enabled: true
    name: "unistore"

  cacheImage:
    enabled: false

  mibsImage:
    enabled: true
    repository: "frinx/lg-device-workers"
    tag: "1.1.10"
    mibsPath: "/home/workers/app/uc_data/mib_files/*"

frinx-demo-workflows:
  enabled: true
  fullnameOverride: "frinx-demo-workflows"

  image:
    repository: frinx/frinx-demo-workflows
    pullPolicy: Always
    # Overrides the image tag whose default is the chart appVersion.
    tag: "6.0.0"

  env:
    CONDUCTOR_URL_BASE: http://conductor-server:8080/api
    SCHELLAR_URL_BASE: http://conductor-server:3000/query