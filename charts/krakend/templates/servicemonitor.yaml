{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Chart.Name }}-service-monitor
  labels:
    prometheus: krakend-app
    {{- include "krakend.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: krakend
      app.kubernetes.io/name: krakend
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s    
{{- end }}